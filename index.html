<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#faf5ee">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Chariots">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="chariot-192.png">
<title>Roman Chariots</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ===== RESET ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-tap-highlight-color:transparent;overflow-x:hidden}
body{
  font-family:'Inter',sans-serif;
  min-height:100vh;min-height:100dvh;
  overflow-x:hidden;
  background:#faf5ee;
  color:#3a3028;
  position:relative;
}
body::before{
  content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  background:url('logo.png') center center / contain no-repeat;
  filter:blur(1px) saturate(0.7);
  opacity:0.25;
  z-index:0;
  pointer-events:none;
}
input,button,textarea,select{font-family:inherit;font-size:inherit;border:none;outline:none;background:none}
button{cursor:pointer}
a{text-decoration:none;color:inherit}

/* ===== CSS VARIABLES — Admont Abbey Palette ===== */
:root{
  --bg:#faf5ee;
  --bg-warm:#f0e8da;
  --card:rgba(255,253,248,0.92);
  --card-border:rgba(180,160,120,0.14);
  --card-shadow:0 2px 14px rgba(100,80,50,0.07);
  --input-bg:rgba(255,255,252,0.95);
  --text:#3a3028;
  --text-dim:#8a7e6a;
  --text-bright:#1a1610;
  --gold:#d0a840;
  --gold-soft:rgba(208,168,64,0.14);
  --gold-glow:rgba(208,168,64,0.25);
  --sky:#52b4c8;
  --sky-soft:rgba(82,180,200,0.12);
  --sky-deep:#3a98b0;
  --teal:#4a8a7a;
  --teal-soft:rgba(74,138,122,0.12);
  --rose:#c89090;
  --rose-soft:rgba(200,144,144,0.10);
  --terracotta:#c47040;
  --terracotta-soft:rgba(196,112,64,0.10);
  --marble:#e8ddd0;
  --radius:14px;
  --radius-sm:8px;
  --nav-bg:rgba(250,245,238,0.96);
  --nav-border:rgba(180,160,120,0.10);
  --modal-bg:rgba(250,245,238,0.97);
  --toast-bg:rgba(255,253,248,0.96);
}

/* ===== LAYOUT ===== */
.app{
  max-width:480px;margin:0 auto;
  padding:calc(env(safe-area-inset-top,8px) + 12px) 16px 100px;
  min-height:100vh;min-height:100dvh;
  position:relative;z-index:1;
}

/* ===== HEADER ===== */
.header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;
}
.header-left{display:flex;align-items:center;gap:10px}
.header-logo{width:48px;height:48px;border-radius:50%;object-fit:contain;background:#faf5ee;box-shadow:0 2px 8px rgba(100,80,50,0.15)}
.app-title{
  font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;
  color:var(--text-bright);letter-spacing:-0.5px;
}
.app-title span{color:var(--sky)}
.header-month{
  font-size:.78rem;color:var(--text-dim);margin-top:2px;
}
.month-nav{
  display:flex;align-items:center;gap:8px;
}
.month-btn{
  width:30px;height:30px;border-radius:50%;
  background:var(--sky-soft);color:var(--sky);
  display:flex;align-items:center;justify-content:center;
  font-size:.85rem;font-weight:700;
}
.month-btn:active{background:rgba(82,180,200,0.25)}

/* ===== SUMMARY CARDS ===== */
.summary{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  margin-bottom:16px;
}
.summary-card{
  background:var(--card);border:1px solid var(--card-border);
  border-radius:var(--radius);padding:14px;
  box-shadow:var(--card-shadow);
}
.summary-card.full{grid-column:1/-1}
.summary-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.8px;color:var(--text-dim);font-weight:600}
.summary-value{font-size:1.4rem;font-weight:700;margin-top:4px;font-family:'Playfair Display',serif}
.summary-value.income{color:var(--text-bright)}
.summary-value.expense{color:var(--text-bright)}
.summary-value.net{color:var(--gold)}
.summary-sub{font-size:.68rem;color:var(--text-dim);margin-top:2px}

/* ===== CATEGORY BREAKDOWN ===== */
.cat-section{margin-bottom:16px}
.cat-title{
  font-family:'Playfair Display',serif;font-size:.95rem;font-weight:600;
  color:var(--text-bright);margin-bottom:10px;
}
.cat-bar-wrap{margin-bottom:8px}
.cat-bar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.cat-bar-name{font-size:.72rem;font-weight:600;color:var(--text)}
.cat-bar-amount{font-size:.72rem;color:var(--text-dim);font-weight:500}
.cat-bar-track{height:6px;background:var(--bg-warm);border-radius:3px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:3px;transition:width .4s ease}

/* ===== INSIGHTS CARDS ===== */
.insight-card{
  background:var(--card);border:1px solid var(--card-border);
  border-radius:var(--radius);padding:12px 14px;
  box-shadow:var(--card-shadow);margin-bottom:8px;
  font-size:.78rem;color:var(--text);line-height:1.4;
}
.insight-icon{margin-right:6px}

/* ===== TIPS ===== */
.tips-section{margin-bottom:16px}
.tip-card{
  background:var(--card);border:1px solid var(--card-border);
  border-radius:var(--radius);padding:14px 16px;
  box-shadow:var(--card-shadow);margin-bottom:8px;
  font-size:.78rem;color:var(--text);line-height:1.5;
}
.tip-card .tip-title{
  font-weight:700;color:var(--sky-deep);font-size:.72rem;
  text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;
}
.tip-card .tip-text{color:var(--text)}


/* ===== TRANSACTIONS LIST ===== */
.tx-section{}
.tx-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;
}
.tx-title{
  font-family:'Playfair Display',serif;font-size:.95rem;font-weight:600;
  color:var(--text-bright);
}
.tx-search{
  background:var(--input-bg);border:1px solid var(--card-border);
  border-radius:20px;padding:6px 12px;font-size:.75rem;
  width:140px;color:var(--text);
}
.tx-search::placeholder{color:var(--text-dim)}
.tx-filters{display:flex;gap:5px;margin-bottom:10px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.tx-filters::-webkit-scrollbar{display:none}
.tx-filter{
  font-size:.65rem;font-weight:600;padding:5px 10px;border-radius:14px;
  white-space:nowrap;background:var(--bg-warm);color:var(--text-dim);
  border:1px solid transparent;transition:all .2s;flex-shrink:0;
}
.tx-filter.active{background:var(--sky-soft);color:var(--sky-deep);border-color:rgba(82,180,200,0.3)}
.tx-date-group{margin-bottom:12px}
.tx-date-label{font-size:.65rem;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;padding-left:2px}
.tx-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;background:var(--card);
  border:1px solid var(--card-border);border-radius:var(--radius-sm);
  box-shadow:var(--card-shadow);margin-bottom:4px;
}
.tx-cat-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;
}
.tx-body{flex:1;min-width:0}
.tx-text{font-size:.82rem;font-weight:500;color:var(--text-bright);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{font-size:.62rem;color:var(--text-dim);margin-top:1px}
.tx-amount{font-size:.85rem;font-weight:700;flex-shrink:0}
.tx-amount.income{color:var(--text-bright)}
.tx-amount.expense{color:var(--text-bright)}
.tx-copy{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-dim);background:var(--gold-soft);
  transition:background .15s,color .15s;margin-left:4px;
}
.tx-copy:active{background:var(--gold);color:#fff}
.tx-copy svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tx-empty{text-align:center;padding:40px 10px;color:var(--text-dim);font-size:.82rem}

/* ===== RECURRING ===== */
.rec-total{
  background:var(--gold-soft);border-radius:var(--radius-sm);
  padding:10px 14px;margin-bottom:10px;
  display:flex;justify-content:space-between;align-items:center;
}
.rec-total-label{font-size:.72rem;font-weight:600;color:var(--gold)}
.rec-total-value{font-size:1rem;font-weight:700;color:var(--gold)}
.rec-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;background:var(--card);
  border:1px solid var(--card-border);border-radius:var(--radius-sm);
  box-shadow:var(--card-shadow);margin-bottom:4px;
}
.rec-toggle{
  width:36px;height:20px;border-radius:10px;
  background:var(--bg-warm);position:relative;transition:background .2s;flex-shrink:0;
}
.rec-toggle.on{background:var(--teal-soft);border:1px solid var(--teal)}
.rec-toggle::after{
  content:'';position:absolute;top:2px;left:2px;
  width:16px;height:16px;border-radius:50%;
  background:var(--text-dim);transition:all .2s;
}
.rec-toggle.on::after{left:18px;background:var(--teal)}
.rec-del{font-size:.7rem;color:var(--red);padding:4px 8px;font-weight:600}

/* ===== INSIGHTS TAB ===== */
.trend-chart{
  background:var(--card);border:1px solid var(--card-border);
  border-radius:var(--radius);padding:14px;box-shadow:var(--card-shadow);
  margin-bottom:12px;
}
.trend-bars{display:flex;align-items:flex-end;gap:4px;height:120px;padding-top:10px}
.trend-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.trend-bar{width:100%;border-radius:3px 3px 0 0;min-height:2px;transition:height .4s}
.trend-bar.income-bar{background:var(--sky)}
.trend-bar.expense-bar{background:var(--gold)}
.trend-label{font-size:.55rem;color:var(--text-dim);font-weight:500}
.top-cats{margin-bottom:16px}
.top-cat-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 0;border-bottom:1px solid var(--card-border);
}
.top-cat-rank{font-size:.7rem;font-weight:700;color:var(--text-dim);width:16px;text-align:center}
.top-cat-name{flex:1;font-size:.78rem;font-weight:500}
.top-cat-amount{font-size:.78rem;font-weight:700;color:var(--red)}
.comparison{
  background:var(--card);border:1px solid var(--card-border);
  border-radius:var(--radius);padding:14px;box-shadow:var(--card-shadow);
  margin-bottom:12px;
}
.comp-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0}
.comp-label{font-size:.75rem;color:var(--text)}
.comp-value{font-size:.75rem;font-weight:700}
.comp-value.up{color:var(--rose)}
.comp-value.down{color:var(--teal)}
.comp-value.neutral{color:var(--text)}

/* ===== SETTINGS ===== */
.setting-group{
  background:var(--card);border:1px solid var(--card-border);
  border-radius:var(--radius);padding:14px;box-shadow:var(--card-shadow);
  margin-bottom:12px;
}
.setting-title{font-size:.72rem;font-weight:700;color:var(--sky-deep);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.setting-row{padding:8px 0;border-bottom:1px solid var(--card-border)}
.setting-row:last-child{border-bottom:none}
.setting-label{font-size:.78rem;font-weight:500;color:var(--text)}
.setting-desc{font-size:.65rem;color:var(--text-dim);margin-top:2px}
.form-input{
  width:100%;padding:8px 12px;background:var(--input-bg);
  border:1px solid var(--card-border);border-radius:var(--radius-sm);
  font-size:.78rem;color:var(--text);margin-top:6px;
}
.form-input::placeholder{color:var(--text-dim)}
.btn{
  padding:8px 16px;border-radius:var(--radius-sm);font-size:.75rem;
  font-weight:600;transition:all .15s;
}
.btn-gold{background:var(--sky);color:#fff}
.btn-gold:active{background:var(--sky-deep)}
.btn-outline{border:1px solid var(--card-border);color:var(--text)}
.btn-danger{background:var(--red-soft);color:var(--red)}

/* ===== BOTTOM NAV ===== */
.nav{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--nav-bg);
  border-top:1px solid var(--nav-border);
  display:flex;justify-content:space-around;
  padding:8px 0 calc(env(safe-area-inset-bottom,8px) + 4px);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  z-index:100;
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  font-size:.58rem;font-weight:600;color:var(--text-dim);
  padding:4px 12px;transition:color .2s;
}
.nav-item.active{color:var(--sky)}
.nav-icon{font-size:1.2rem}

/* ===== FAB (floating add button) ===== */
.fab{
  position:fixed;bottom:72px;right:20px;
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--sky),var(--teal));
  color:#fff;font-size:1.5rem;font-weight:300;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(82,180,200,0.35);
  z-index:101;transition:transform .15s;
}
.fab:active{transform:scale(0.92)}
.fab-scan{
  position:fixed;bottom:132px;right:24px;
  width:42px;height:42px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--terracotta));
  color:#fff;font-size:1.1rem;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 12px rgba(208,168,64,0.35);
  z-index:101;transition:transform .15s;
}
.fab-scan:active{transform:scale(0.92)}
@media(min-width:769px){.fab-scan{display:none!important}}

/* ===== SCAN MENU ===== */
.scan-menu-backdrop{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.3);z-index:200;
  display:none;
}
.scan-menu-backdrop.show{display:block}
.scan-menu{
  position:fixed;bottom:184px;right:24px;
  background:var(--card);border-radius:var(--radius);
  box-shadow:0 4px 20px rgba(0,0,0,0.18);
  z-index:201;overflow:hidden;
  display:none;min-width:170px;
}
.scan-menu.show{display:block}
.scan-menu-item{
  display:flex;align-items:center;gap:10px;
  padding:14px 18px;font-size:.9rem;font-weight:500;
  color:var(--text);cursor:pointer;
  transition:background .15s;
}
.scan-menu-item:hover,.scan-menu-item:active{background:var(--gold-soft)}
.scan-menu-item+.scan-menu-item{border-top:1px solid var(--card-border)}
.scan-menu-item svg{width:20px;height:20px;stroke:var(--sky);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ===== SCAN LOADING OVERLAY ===== */
.scan-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.5);z-index:300;
  display:none;align-items:center;justify-content:center;
  flex-direction:column;gap:16px;
}
.scan-overlay.show{display:flex}
.scan-spinner{
  width:48px;height:48px;border-radius:50%;
  border:3px solid rgba(255,255,255,0.2);border-top-color:#fff;
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.scan-status{color:#fff;font-size:.85rem;font-weight:500;text-align:center}

/* ===== RECEIPT REVIEW MODAL ===== */
.review-modal{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:var(--bg);z-index:250;
  transform:translateY(100%);transition:transform .3s ease;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.review-modal.show{transform:translateY(0)}
.review-header{
  position:sticky;top:0;background:var(--bg);
  padding:calc(env(safe-area-inset-top,8px) + 12px) 16px 10px;
  border-bottom:1px solid var(--card-border);z-index:1;
}
.review-title{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--text-bright)}
.review-store{font-size:.75rem;color:var(--text-dim);margin-top:2px}
.review-items{padding:12px 16px calc(env(safe-area-inset-bottom,8px) + 80px)}
.review-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;background:var(--card);
  border:1px solid var(--card-border);border-radius:var(--radius-sm);
  box-shadow:var(--card-shadow);margin-bottom:4px;
}
.review-item.unchecked{opacity:0.4}
.review-check{width:20px;height:20px;border-radius:4px;border:2px solid var(--card-border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.7rem;color:var(--sky)}
.review-check.checked{background:var(--sky-soft);border-color:var(--sky)}
.review-item-body{flex:1;min-width:0}
.review-item-name{font-size:.82rem;font-weight:500;color:var(--text-bright)}
.review-item-cat{font-size:.6rem;color:var(--text-dim);margin-top:1px}
.review-item-price{font-size:.85rem;font-weight:700;color:var(--text-bright);flex-shrink:0}
.review-footer{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--bg);border-top:1px solid var(--card-border);
  padding:12px 16px calc(env(safe-area-inset-bottom,8px) + 12px);
  display:flex;gap:10px;z-index:251;
}
.review-footer .btn{flex:1;padding:12px;text-align:center}
.review-total{
  display:flex;justify-content:space-between;padding:10px 12px;
  background:var(--gold-soft);border-radius:var(--radius-sm);margin-bottom:8px;
}
.review-total-label{font-size:.75rem;font-weight:600;color:var(--gold)}
.review-total-value{font-size:.85rem;font-weight:700;color:var(--gold)}
.review-item-edit{
  display:flex;align-items:center;justify-content:center;
  width:24px;height:24px;flex-shrink:0;border-radius:4px;
  color:var(--text-dim);font-size:.7rem;
}
.review-item-edit:active{background:var(--gold-soft)}
.review-edit-row{
  display:flex;flex-direction:column;gap:6px;
  padding:10px 12px;background:var(--gold-soft);
  border:1px solid rgba(208,168,64,0.25);border-radius:var(--radius-sm);
  margin-bottom:4px;
}
.review-edit-field{
  display:flex;align-items:center;gap:8px;
}
.review-edit-field label{font-size:.65rem;color:var(--text-dim);width:50px;flex-shrink:0;font-weight:600}
.review-edit-field input{
  flex:1;padding:6px 8px;font-size:.8rem;
  background:var(--input-bg);border:1px solid var(--card-border);
  border-radius:6px;color:var(--text);min-width:0;
}
.review-edit-cats{display:flex;flex-wrap:wrap;gap:4px}
.review-edit-cat{
  padding:3px 8px;font-size:.6rem;font-weight:600;
  border-radius:12px;border:1px solid var(--card-border);
  background:var(--card);color:var(--text-dim);
}
.review-edit-cat.active{background:var(--sky-soft);border-color:var(--sky);color:var(--sky)}
.review-edit-btns{display:flex;gap:6px;justify-content:flex-end;margin-top:2px}
.review-edit-btns button{
  padding:4px 12px;font-size:.7rem;font-weight:600;
  border-radius:6px;
}
.review-edit-save{background:var(--sky);color:#fff}
.review-edit-cancel{background:var(--bg-warm);color:var(--text-dim)}
.review-item-memorized{
  font-size:.55rem;color:var(--teal);font-style:italic;margin-top:1px;
}

/* ===== ADD MODAL ===== */
.modal-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.3);z-index:200;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--modal-bg);
  border-radius:20px 20px 0 0;
  padding:20px 20px calc(env(safe-area-inset-bottom,8px) + 16px);
  z-index:201;
  transform:translateY(100%);transition:transform .3s ease;
  max-width:480px;margin:0 auto;
}
.modal-overlay.show+.modal,.modal.show{transform:translateY(0)}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--card-border);margin:0 auto 16px}
.modal-title{
  font-family:'Playfair Display',serif;font-size:1.05rem;
  font-weight:600;color:var(--text-bright);margin-bottom:14px;
}
.quick-input{
  width:100%;padding:14px 16px;
  background:var(--input-bg);border:1px solid var(--card-border);
  border-radius:var(--radius);font-size:.95rem;color:var(--text);
}
.quick-input::placeholder{color:var(--text-dim)}
.quick-hint{font-size:.65rem;color:var(--text-dim);margin-top:6px;padding-left:4px}
.modal-fields{margin-top:14px;display:flex;flex-direction:column;gap:10px}
.field-row{display:flex;align-items:center;gap:10px}
.field-label{font-size:.72rem;font-weight:600;color:var(--text-dim);width:70px;flex-shrink:0}
.type-toggle{display:flex;gap:0;border-radius:8px;overflow:hidden;border:1px solid var(--card-border)}
.type-btn{
  padding:6px 14px;font-size:.72rem;font-weight:600;
  background:var(--bg-warm);color:var(--text-dim);transition:all .15s;
}
.type-btn.active-expense{background:var(--gold-soft);color:var(--gold)}
.type-btn.active-income{background:var(--sky-soft);color:var(--sky-deep)}
.cat-picker{display:flex;gap:5px;flex-wrap:wrap}
.cat-chip{
  font-size:.65rem;font-weight:600;padding:5px 10px;border-radius:12px;
  background:var(--bg-warm);color:var(--text-dim);transition:all .15s;
}
.cat-chip.active{color:#fff}
.field-input{
  flex:1;padding:8px 12px;background:var(--input-bg);
  border:1px solid var(--card-border);border-radius:var(--radius-sm);
  font-size:.78rem;color:var(--text);
}
.modal-actions{display:flex;gap:10px;margin-top:16px}
.modal-actions .btn{flex:1;padding:12px;text-align:center}

/* ===== TOAST ===== */
.toast{
  position:fixed;top:40px;left:50%;transform:translateX(-50%) translateY(-80px);
  background:var(--toast-bg);color:var(--text);
  padding:10px 20px;border-radius:20px;font-size:.78rem;font-weight:500;
  box-shadow:0 4px 20px rgba(0,0,0,0.12);z-index:300;
  transition:transform .3s ease;border:1px solid var(--card-border);
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ===== EDIT MODAL ===== */
.edit-actions{display:flex;gap:8px;margin-top:14px}

/* ===== INVESTED TAB ===== */
.inv-summary{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;
}
.inv-card{
  background:var(--card);border:1px solid var(--card-border);
  border-radius:var(--radius);padding:14px;box-shadow:var(--card-shadow);
}
.inv-card.full{grid-column:1/-1}
.inv-label{font-size:.62rem;text-transform:uppercase;letter-spacing:.6px;color:var(--text-dim);font-weight:600}
.inv-value{font-size:1.2rem;font-weight:700;margin-top:4px;font-family:'Playfair Display',serif;color:var(--text-bright)}
.inv-sub{font-size:.65rem;color:var(--text-dim);margin-top:2px}
.inv-entry{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 12px;background:var(--card);border:1px solid var(--card-border);
  border-radius:var(--radius-sm);box-shadow:var(--card-shadow);margin-bottom:4px;
  cursor:pointer;
}
.inv-entry-left{display:flex;flex-direction:column;gap:2px}
.inv-entry-amount{font-size:.88rem;font-weight:700;color:var(--text-bright)}
.inv-entry-date{font-size:.68rem;color:var(--text-dim)}
.inv-delete-btn{
  width:28px;height:28px;border-radius:50%;
  background:var(--rose-soft);color:var(--rose);
  display:flex;align-items:center;justify-content:center;
  font-size:.75rem;font-weight:700;border:none;cursor:pointer;
}
.inv-add-row{
  display:flex;gap:8px;margin-bottom:16px;
}
.inv-add-input{
  flex:1;padding:10px 14px;background:var(--input-bg);
  border:1px solid var(--card-border);border-radius:var(--radius-sm);
  font-size:.85rem;color:var(--text);
}
.inv-add-input::placeholder{color:var(--text-dim)}
.bloom-link{
  display:block;text-align:center;margin-top:12px;
  font-size:.72rem;color:var(--sky-deep);font-weight:600;
  padding:10px;background:var(--sky-soft);border-radius:var(--radius-sm);
}

/* ===== VIEWS ===== */
.view{display:none}
.view.active{display:block}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:0;height:0}

<script>

};
let CATEGORIES = Object.assign({}, DEFAULT_CATEGORIES);

function loadCustomCategories() {
  if (data && data.settings && data.settings.customCategories) {
    for (const [key, val] of Object.entries(data.settings.customCategories)) {
      // Migrate old emoji icons to SVG
      if (val.icon && !val.icon.startsWith('<svg')) {

// Auto-categorization keywords

// ===== STATE =====
let data = null;
let viewMonth = new Date(); // currently viewed month
let currentFilter = 'all';
let editingTx = null; // transaction being edited
let manualType = false; // user manually picked income/expense
let _syncTimer = null;

// ===== DATA =====
function loadData() {
  try {
    data = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (!data || !data.transactions) throw 0;
  } catch(e) {
    data = { transactions: [], recurring: [], patterns: {}, scanMemory: {}, settings: { name: '', syncUrl: '' }, lastModified: 0 };
  }
  // Migrate old categories
  let migrated = false;
  (data.transactions || []).forEach(t => {
    if (t.category === 'food') { t.category = 'groceries'; migrated = true; }
    if (t.category === 'income') { t.category = 'pay'; migrated = true; }
    if (t.text === 'Education' && t.category === 'other') { t.category = 'education'; migrated = true; }
  });
  (data.recurring || []).forEach(r => {
    if (r.category === 'food') { r.category = 'groceries'; migrated = true; }
    if (r.category === 'income') { r.category = 'pay'; migrated = true; }
  });
  // Strip embedded amounts from transaction names (e.g. "22 Royal Restaurant" → "Royal Restaurant")
  if (!localStorage.getItem('rc_migrated_strip_amounts')) {
    (data.transactions || []).forEach(t => {
      const stripped = stripAmount(t.text);
      if (stripped !== t.text) { t.text = stripped; migrated = true; }
    });
    (data.recurring || []).forEach(r => {
      const stripped = stripAmount(r.text);
      if (stripped !== r.text) { r.text = stripped; migrated = true; }
    });
    localStorage.setItem('rc_migrated_strip_amounts', '1');
  }
  if (!data.scanMemory) data.scanMemory = {};
  if (!data.deletedIds) data.deletedIds = [];
  if (migrated) localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  return data;
}

function dedupTransactions() {
  // Remove duplicate transactions and mark removed IDs as deleted so sync won't re-add them
  if (!data.transactions || data.transactions.length === 0) return;
  const seen = {};
  const clean = [];
  if (!data.deletedIds) data.deletedIds = [];
  for (const t of data.transactions) {
    const key = t.date + '|' + String(t.text).trim() + '|' + Number(t.amount);
    if (seen[key]) { if (t.id && data.deletedIds.indexOf(t.id) === -1) data.deletedIds.push(t.id); continue; }
    seen[key] = true;
    clean.push(t);
  }
  if (clean.length < data.transactions.length) {
    data.transactions = clean;
  }
}

function applyRecurring() {
  dedupTransactions();
  if (!data.recurring || data.recurring.length === 0) return;
  const now = new Date();
  const mk = getMonthKey(now);
  let added = false;
  for (const r of data.recurring) {
    if (!r.active) continue;
    // Check if a transaction from this recurring item already exists this month
    const exists = data.transactions.some(t => t.date.startsWith(mk) && t.recurringId === r.id);
    if (exists) continue;
    const day = Math.min(r.dayOfMonth || 1, new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate());
    const dateStr = mk + '-' + String(day).padStart(2, '0');
    data.transactions.push({
      id: 'tx_' + Date.now() + '_' + r.id,
      text: r.text,
      amount: r.amount,
      type: r.type,
      category: r.category,
      date: dateStr,
      time: '00:00',
      dayOfWeek: new Date(dateStr + 'T12:00:00').getDay(),
      recurring: true,
      recurringId: r.id,
      notes: 'Auto-generated recurring'
    });
    added = true;
  }
  if (added) saveData();
}

function saveData() {
  data.lastModified = Date.now();
  _lastLocalSave = Date.now();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  syncToCloud();
}

// ===== HELPERS =====
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function titleCase(s) { return s.replace(/\b\w/g, c => c.toUpperCase()); }
function fmt(n) { return '$' + Math.abs(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }
function fmtShort(n) {
  if (Math.abs(n) >= 1000) return '$' + (Math.abs(n)/1000).toFixed(1) + 'k';
  return '$' + Math.abs(n).toFixed(0);
}

function getMonthKey(d) {
  if (typeof d === 'string') return d.substring(0, 7);
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
}

function getMonthLabel(key) {
  const [y, m] = key.split('-');
  return MONTHS[parseInt(m) - 1] + ' ' + y;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ===== AUTO-CATEGORIZE =====
function autoCategory(text) {
  const lower = text.toLowerCase();
  // Check learned patterns first
  if (data.patterns[lower] && data.patterns[lower].category) {
    return data.patterns[lower].category;
  }
  // Check keywords
  for (const [cat, words] of Object.entries(KEYWORDS)) {
    for (const w of words) {
      if (lower.includes(w)) return cat;
    }
  }
  return 'other';
}

function autoType(text) {
  const lower = text.toLowerCase();
  for (const w of KEYWORDS.pay) {
    if (lower.includes(w)) return 'income';
  }
  for (const w of KEYWORDS.tips) {
    if (lower.includes(w)) return 'income';
  }
  return 'expense';
}

// ===== PARSE QUICK INPUT =====
function parseQuickInput() {
  const raw = document.getElementById('quickInput').value.trim();
  if (!raw) {
    document.getElementById('quickHint').textContent = 'Type what you bought and the amount';
    return;
  }
  // Parse amount: $XX.XX anywhere, or standalone number at start/end
  let amount = 0, text = raw;
  const dollarMatch = raw.match(/\$\s*([\d,]+\.?\d*)/);
  if (dollarMatch) {
    amount = parseFloat(dollarMatch[1].replace(',', ''));
    text = raw.replace(dollarMatch[0], '').trim();
  } else {
    // Number at end: "Royal Restaurant 22"
    const endMatch = raw.match(/^(.+?)\s+([\d,]+\.?\d*)\s*$/);
    // Number at start: "22 Royal Restaurant"
    const startMatch = raw.match(/^([\d,]+\.?\d*)\s+(.+)$/);
    if (endMatch) {
      text = endMatch[1].trim();
      amount = parseFloat(endMatch[2].replace(',', ''));
    } else if (startMatch) {
      amount = parseFloat(startMatch[1].replace(',', ''));
      text = startMatch[2].trim();
    }
  }
  // Auto detect type and category (skip type if user manually picked)
  const type = manualType ? modalType : autoType(text);
  const cat = type === 'income' ? autoCategory(text) || 'pay' : autoCategory(text);
  // Update fields
  if (amount > 0) document.getElementById('fieldAmount').value = amount.toFixed(2);
  if (text) {
    if (!manualType) setType(type);
    selectCategory(cat);
    const catInfo = CATEGORIES[cat];
    let hint = `${catInfo.icon} ${catInfo.label} \u2022 ${type === 'income' ? '+' : '-'}${fmt(amount)}`;
    // Show pattern info if we've seen this item before
    const pat = data.patterns[text.toLowerCase()];
    if (pat && pat.count > 0) {
      hint += ` \u2022 avg ${fmt(pat.avgAmount)} \u00d7 ${pat.count}`;
    }
    document.getElementById('quickHint').innerHTML = hint;
  }
}

// ===== PATTERN TRACKING =====
function updatePatterns(tx) {
  const key = tx.text.toLowerCase();
  if (!data.patterns[key]) {
    data.patterns[key] = {
      count: 0, totalAmount: 0, avgAmount: 0,
      avgGapDays: 0, lastDate: null,
      dayDistribution: [0,0,0,0,0,0,0],
      category: tx.category
    };
  }
  const p = data.patterns[key];
  if (p.lastDate) {
    const gap = (new Date(tx.date) - new Date(p.lastDate)) / 86400000;
    if (gap > 0) p.avgGapDays = p.avgGapDays ? (p.avgGapDays * 0.7 + gap * 0.3) : gap;
  }
  p.count++;
  p.totalAmount += tx.amount;
  p.avgAmount = p.totalAmount / p.count;
  p.lastDate = tx.date;
  p.dayDistribution[tx.dayOfWeek]++;
  p.category = tx.category;
}

// ===== GET MONTH DATA =====
function getMonthTx(monthKey) {
  return data.transactions.filter(t => t.date.startsWith(monthKey));
}

function getMonthIncome(monthKey) {
  return getMonthTx(monthKey).filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
}

function getMonthExpense(monthKey) {
  return getMonthTx(monthKey).filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
}

// ===== AVERAGES =====
function getAverages(months) {
  const keys = [];
  const now = new Date();
  for (let i = 0; i < months; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    keys.push(getMonthKey(d));
  }
  // Only count months that have transactions
  let incomeTotal = 0, expenseTotal = 0, count = 0;
  for (const k of keys) {
    const tx = getMonthTx(k);
    if (tx.length > 0) {
      incomeTotal += getMonthIncome(k);
      expenseTotal += getMonthExpense(k);
      count++;
    }
  }
  if (count === 0) return { income: 0, expense: 0 };
  return { income: incomeTotal / count, expense: expenseTotal / count };
}

function getAllTimeAverages() {
  if (data.transactions.length === 0) return { income: 0, expense: 0 };
  // Find unique months with transactions
  const months = new Set(data.transactions.map(t => t.date.substring(0, 7)));
  let incomeTotal = 0, expenseTotal = 0;
  for (const k of months) {
    incomeTotal += getMonthIncome(k);
    expenseTotal += getMonthExpense(k);
  }
  const count = months.size || 1;
  return { income: incomeTotal / count, expense: expenseTotal / count };
}

// ===== RENDER DASHBOARD =====
function renderDashboard() {
  const mk = getMonthKey(viewMonth);
  const income = getMonthIncome(mk);
  const expense = getMonthExpense(mk);
  const net = income - expense;

  // Summary cards
  document.getElementById('summaryCards').innerHTML = `
    <div class="summary-card">
      <div class="summary-label">Income</div>
      <div class="summary-value income">${fmt(income)}</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Spent</div>
      <div class="summary-value expense">${fmt(expense)}</div>
    </div>
    <div class="summary-card full">
      <div class="summary-label">Net</div>
      <div class="summary-value net">${net >= 0 ? '+' : '-'}${fmt(Math.abs(net))}</div>
      <div class="summary-sub">${data.recurring.filter(r => r.active).length} recurring expenses \u2022 ${fmt(data.recurring.filter(r => r.active && r.type === 'expense').reduce((s, r) => s + r.amount, 0))}/mo</div>
    </div>
  `;

  // Category breakdown
  const expenses = getMonthTx(mk).filter(t => t.type === 'expense');
  const byCat = {};
  for (const t of expenses) {
    byCat[t.category] = (byCat[t.category] || 0) + t.amount;
  }
  const sorted = Object.entries(byCat).sort((a, b) => b[1] - a[1]);
  const maxCat = sorted.length > 0 ? sorted[0][1] : 1;
  let catHTML = '<div class="cat-title">Spending by Category</div>';
  if (sorted.length === 0) {
    catHTML += '<div class="tx-empty">No expenses this month</div>';
  } else {
    for (const [cat, amt] of sorted) {
      const info = CATEGORIES[cat] || CATEGORIES.other;
      const pct = (amt / maxCat * 100).toFixed(0);
      catHTML += `<div class="cat-bar-wrap">
        <div class="cat-bar-header">
          <span class="cat-bar-name">${info.icon} ${info.label}</span>
          <span class="cat-bar-amount">${fmt(amt)}</span>
        </div>
        <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${pct}%;background:${info.color}"></div></div>
      </div>`;
    }
  }
  document.getElementById('catBreakdown').innerHTML = catHTML;

  // Smart insights
  renderSmartInsights(mk);

  // Tips (only on first render, not on every re-render)
  if (!document.getElementById('tipsSection').innerHTML) renderTips();
}

// ===== SMART INSIGHTS =====
function renderSmartInsights(mk) {
  const insights = [];
  const now = new Date();

  // Spending pace
  const dayOfMonth = now.getDate();
  const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
  const pct = dayOfMonth / daysInMonth;
  const currentExpense = getMonthExpense(mk);
  const avg3 = getAverages(3);
  if (avg3.expense > 0 && getMonthKey(now) === mk) {
    const expectedPace = avg3.expense * pct;
    const diff = currentExpense - expectedPace;
    if (Math.abs(diff) > 20) {
      const direction = diff > 0 ? 'ahead of' : 'behind';
      const emoji = diff > 0 ? SVG('<path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>') : SVG('<path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>');
      insights.push(`${emoji} You've spent ${fmt(currentExpense)} by day ${dayOfMonth}. Your 3-month pace would be ${fmt(expectedPace)} \u2014 you're ${direction} pace by ${fmt(Math.abs(diff))}.`);
    }
  }

  // Recurring total
  const recTotal = data.recurring.filter(r => r.active && r.type === 'expense').reduce((s, r) => s + r.amount, 0);
  if (recTotal > 0) {
    insights.push(`${SVG('<polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>')} You have ${fmt(recTotal)} in monthly recurring expenses (${data.recurring.filter(r => r.active && r.type === 'expense').length} items).`);
  }

  // Pattern insights — spending habit observations
  for (const [key, p] of Object.entries(data.patterns)) {
    if (p.count < 3) continue;
    // Frequency pattern
    if (p.avgGapDays > 0 && p.avgGapDays < 35) {
      const gap = Math.round(p.avgGapDays);
      if (gap <= 7) insights.push(`${SVG('<polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/>')} You ${key} about every ${gap} day${gap !== 1 ? 's' : ''} (~${fmt(p.avgAmount)} each time).`);
      else if (gap <= 14) insights.push(`${SVG('<polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/>')} You ${key} roughly every ${gap} days (~${fmt(p.avgAmount)}).`);
    }
  }

  // Category comparison to 3-month avg
  if (avg3.expense > 0) {
    const expenses = getMonthTx(mk).filter(t => t.type === 'expense');
    const byCat = {};
    for (const t of expenses) byCat[t.category] = (byCat[t.category] || 0) + t.amount;

    // Get 3mo avg by category
    const catAvgs = {};
    for (let i = 1; i <= 3; i++) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const k = getMonthKey(d);
      for (const t of getMonthTx(k).filter(t2 => t2.type === 'expense')) {
        catAvgs[t.category] = (catAvgs[t.category] || 0) + t.amount;
      }
    }
    for (const c in catAvgs) catAvgs[c] /= 3;

    for (const [cat, amt] of Object.entries(byCat)) {
      if (catAvgs[cat] && catAvgs[cat] > 20) {
        const diff = ((amt - catAvgs[cat]) / catAvgs[cat] * 100).toFixed(0);
        if (diff > 20) {
          const info = CATEGORIES[cat] || CATEGORIES.other;
          insights.push(`${SVG('<polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>')} ${info.label} spending is ${diff}% higher than your 3-month average.`);
        }
      }
    }
  }

  // Limit to 5 insights
  const html = insights.slice(0, 5).map(i => `<div class="insight-card">${i}</div>`).join('');
  document.getElementById('insightCards').innerHTML = html;
}

function getDailyTip() {
  const today = new Date().toISOString().split('T')[0];
  const saved = JSON.parse(localStorage.getItem('rc_daily_tip') || '{}');
  if (saved.date === today) return TIPS[saved.idx];
  // Pick a new tip, avoid recent ones
  const history = JSON.parse(localStorage.getItem('rc_tip_history') || '[]');
  const pool = [];
  for (let i = 0; i < TIPS.length; i++) {
    if (!history.includes(i)) pool.push(i);
  }
  if (pool.length === 0) {
    // Reset history, keep last 10
    history.length = 0;
    localStorage.setItem('rc_tip_history', '[]');
    for (let i = 0; i < TIPS.length; i++) pool.push(i);
  }
  const idx = pool[Math.floor(Math.random() * pool.length)];
  history.push(idx);
  // Keep history manageable
  if (history.length > 100) history.splice(0, history.length - 100);
  localStorage.setItem('rc_tip_history', JSON.stringify(history));
  localStorage.setItem('rc_daily_tip', JSON.stringify({date: today, idx}));
  return TIPS[idx];
}

function renderTips() {
  const tip = getDailyTip();
  const num = JSON.parse(localStorage.getItem('rc_daily_tip') || '{}').idx + 1;
  let html = '<div class="tips-section">';
  html += '<div class="cat-title">Daily Tip</div>';
  html += `<div class="tip-card"><div class="tip-title">${tip.t}</div><div class="tip-text">${tip.d}</div></div>`;
  html += '</div>';
  document.getElementById('tipsSection').innerHTML = html;
}

// ===== RENDER TRANSACTIONS =====
function renderTransactions() {
  const mk = getMonthKey(viewMonth);
  let txs = getMonthTx(mk);
  const search = document.getElementById('txSearch').value.toLowerCase().trim();

  // Filter by category
  if (currentFilter !== 'all') {
    txs = txs.filter(t => t.category === currentFilter);
  }
  // Filter by search
  if (search) {
    txs = txs.filter(t => t.text.toLowerCase().includes(search) || (t.notes && t.notes.toLowerCase().includes(search)));
  }

  // Category filter pills
  const allCats = new Set(getMonthTx(mk).map(t => t.category));
  let filterHTML = `<div class="tx-filter${currentFilter === 'all' ? ' active' : ''}" onclick="setFilter('all')">All</div>`;
  for (const cat of allCats) {
    const info = CATEGORIES[cat] || CATEGORIES.other;
    filterHTML += `<div class="tx-filter${currentFilter === cat ? ' active' : ''}" onclick="setFilter('${cat}')">${info.icon} ${info.label}</div>`;
  }
  document.getElementById('txFilters').innerHTML = filterHTML;

  // Sort by date descending
  txs.sort((a, b) => b.date.localeCompare(a.date) || b.id.localeCompare(a.id));

  if (txs.length === 0) {
    document.getElementById('txList').innerHTML = '<div class="tx-empty">No transactions found</div>';
    return;
  }

  // Group by date
  const groups = {};
  for (const t of txs) {
    if (!groups[t.date]) groups[t.date] = [];
    groups[t.date].push(t);
  }

  let html = '';
  for (const [date, items] of Object.entries(groups)) {
    const d = new Date(date + 'T12:00:00');
    const label = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    html += `<div class="tx-date-group"><div class="tx-date-label">${label}</div>`;
    for (const t of items) {
      const info = CATEGORIES[t.category] || CATEGORIES.other;
      html += `<div class="tx-item" onclick="openEditModal('${t.id}')">
        <div class="tx-cat-dot" style="background:${info.color}"></div>
        <div class="tx-body">
          <div class="tx-text">${esc(titleCase(t.text))}</div>
          <div class="tx-meta">${info.label}${t.notes ? ' \u2022 ' + esc(t.notes) : ''}${t.time ? ' \u2022 ' + t.time : ''}</div>
        </div>
        <div class="tx-amount ${t.type}">${t.type === 'income' ? '+' : '-'}${fmt(t.amount)}</div>
        <div class="tx-copy" onclick="event.stopPropagation();copyTransaction('${t.id}')" title="Duplicate">
          <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        </div>
      </div>`;
    }
    html += '</div>';
  }
  document.getElementById('txList').innerHTML = html;
}

function setFilter(f) {
  currentFilter = f;
  renderTransactions();
}

// ===== RENDER INVESTED =====
function renderInvested() {
  if (!data.investments) data.investments = [];
  const mk = getMonthKey(viewMonth);
  const thisMonth = data.investments.filter(i => i.date.startsWith(mk));
  const thisMonthTotal = thisMonth.reduce((s, i) => s + i.amount, 0);
  const allTimeTotal = data.investments.reduce((s, i) => s + i.amount, 0);

  // Monthly averages
  const invMonths = new Set(data.investments.map(i => i.date.substring(0, 7)));
  const avgMonthly = invMonths.size > 0 ? allTimeTotal / invMonths.size : 0;

  // Average monthly income (across all months with transactions)
  const incomeByMonth = {};
  data.transactions.filter(t => t.type === 'income').forEach(t => {
    const m = t.date.substring(0, 7);
    incomeByMonth[m] = (incomeByMonth[m] || 0) + t.amount;
  });
  const incomeMonths = Object.keys(incomeByMonth);
  const avgIncome = incomeMonths.length > 0 ? incomeMonths.reduce((s, m) => s + incomeByMonth[m], 0) / incomeMonths.length : 0;

  // Summary
  let html = `<div class="inv-summary">
    <div class="inv-card">
      <div class="inv-label">This Month</div>
      <div class="inv-value">${fmt(thisMonthTotal)}</div>
    </div>
    <div class="inv-card">
      <div class="inv-label">All Time</div>
      <div class="inv-value">${fmt(allTimeTotal)}</div>
    </div>
    <div class="inv-card">
      <div class="inv-label">Avg / Month</div>
      <div class="inv-value">${fmt(avgMonthly)}</div>
      <div class="inv-sub">${invMonths.size} month${invMonths.size !== 1 ? 's' : ''} tracked</div>
    </div>
    <div class="inv-card">
      <div class="inv-label">% of Avg Income</div>
      <div class="inv-value">${avgMonthly > 0 && avgIncome > 0 ? (avgMonthly / avgIncome * 100).toFixed(1) + '%' : '\u2014'}</div>
      <div class="inv-sub" style="color:var(--sky);margin-top:4px">Goal: 10% (${avgIncome > 0 ? fmt(avgIncome * 0.10) : '\u2014'}/mo)</div>
    </div>
  </div>`;
  document.getElementById('invSummary').innerHTML = html;

  // History — individual entries, sorted newest first
  const sorted = [...data.investments].sort((a, b) => b.date.localeCompare(a.date));
  let histHTML = '<div class="cat-title" style="margin:12px 0 8px">History</div>';
  if (sorted.length === 0) {
    histHTML += '<div class="tx-empty">No investments logged yet</div>';
  } else {
    for (const inv of sorted) {
      const d = new Date(inv.date + 'T12:00:00');

      histHTML += `<div class="inv-entry" onclick="editInvestment('${inv.id}')">

function addInvestment() {
  const input = document.getElementById('invAmount');
  const amount = parseFloat(input.value);
  if (!amount || amount <= 0) { toast('Enter an amount'); return; }
  if (!data.investments) data.investments = [];
  data.investments.push({
    id: 'inv_' + Date.now(),
    amount: amount,
    date: new Date().toISOString().split('T')[0]
  });
  input.value = '';
  saveData();
  toast(`${fmt(amount)} invested`);
  renderInvested();
}

function deleteInvestment(id) {
  const inv = data.investments.find(i => i.id === id);
  if (!inv) return;
  if (!confirm('Delete ' + fmt(inv.amount) + ' investment?')) return;
  data.investments = data.investments.filter(i => i.id !== id);
  saveData();
  toast('Deleted');
  renderInvested();
}

function editInvestment(id) {
  const inv = data.investments.find(i => i.id === id);
  if (!inv) return;
  const newAmt = prompt('Edit amount:', inv.amount);
  if (newAmt === null) return;
  const parsed = parseFloat(newAmt);
  if (!parsed || parsed <= 0) { toast('Invalid amount'); return; }
  inv.amount = parsed;
  saveData();
  toast('Updated to ' + fmt(parsed));
  renderInvested();
}

function renderTrendChart() {
  const now = new Date();
  const months = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push(getMonthKey(d));
  }
  const incomes = months.map(m => getMonthIncome(m));
  const expenses = months.map(m => getMonthExpense(m));
  const maxVal = Math.max(...incomes, ...expenses, 1);

  let barsHTML = '';
  for (let i = 0; i < months.length; i++) {
    const iH = Math.max((incomes[i] / maxVal * 100), 2);
    const eH = Math.max((expenses[i] / maxVal * 100), 2);
    const label = MONTHS_SHORT[parseInt(months[i].split('-')[1]) - 1];
    barsHTML += `<div class="trend-bar-col">
      <div class="trend-bar income-bar" style="height:${iH}%" title="Income: ${fmt(incomes[i])}"></div>
      <div class="trend-bar expense-bar" style="height:${eH}%" title="Spent: ${fmt(expenses[i])}"></div>
      <div class="trend-label">${label}</div>
    </div>`;
  }

  document.getElementById('trendChart').innerHTML = `
    <div class="trend-chart">
      <div class="cat-title" style="margin-bottom:8px">Last 6 Months</div>
      <div style="display:flex;gap:10px;margin-bottom:6px">
        <span style="font-size:.6rem;color:var(--sky)">\u25A0 Income</span>
        <span style="font-size:.6rem;color:var(--gold)">\u25A0 Spent</span>
      </div>
      <div class="trend-bars">${barsHTML}</div>
    </div>`;
}

// Spending pace — where you are vs where you should be
function renderSpendingPace() {
  const now = new Date();
  const mk = getMonthKey(now);
  if (getMonthKey(viewMonth) !== mk) {
    document.getElementById('spendingPace').innerHTML = '';
    return;
  }
  const dayOfMonth = now.getDate();
  const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
  const pct = dayOfMonth / daysInMonth;
  const spent = getMonthExpense(mk);
  const earned = getMonthIncome(mk);
  const avg3 = getAverages(3);
  if (avg3.expense === 0) {
    document.getElementById('spendingPace').innerHTML = '';
    return;
  }
  const expectedSpend = avg3.expense * pct;
  const expectedEarn = avg3.income * pct;
  const projectedSpend = (spent / pct).toFixed(0);
  const projectedEarn = earned > 0 ? (earned / pct).toFixed(0) : 0;

  document.getElementById('spendingPace').innerHTML = `
    <div class="comparison" style="margin-bottom:12px">
      <div class="cat-title" style="margin-bottom:6px">Pace (Day ${dayOfMonth} of ${daysInMonth})</div>
      <div class="comp-row">
        <span class="comp-label">Spent so far</span>
        <span class="comp-value neutral">${fmt(spent)}</span>
      </div>
      <div class="comp-row">
        <span class="comp-label">Expected by now (3mo avg)</span>
        <span class="comp-value neutral">${fmt(expectedSpend)}</span>
      </div>
      <div class="comp-row">
        <span class="comp-label">Projected end of month</span>
        <span class="comp-value neutral">~${fmt(parseFloat(projectedSpend))}</span>
      </div>
      <div class="comp-row">
        <span class="comp-label">3mo avg spending</span>
        <span class="comp-value neutral">${fmt(avg3.expense)}</span>
      </div>
    </div>`;
}

// Spending by day of week
function renderWeekdaySpending() {
  const mk = getMonthKey(viewMonth);
  const expenses = getMonthTx(mk).filter(t => t.type === 'expense');
  if (expenses.length < 3) {
    document.getElementById('weekdaySpending').innerHTML = '';
    return;
  }
  const byDay = [0,0,0,0,0,0,0];
  const countDay = [0,0,0,0,0,0,0];
  for (const t of expenses) {
    byDay[t.dayOfWeek] += t.amount;
    countDay[t.dayOfWeek]++;
  }
  const maxDay = Math.max(...byDay, 1);
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  let html = '<div class="comparison" style="margin-bottom:12px"><div class="cat-title" style="margin-bottom:8px">Spending by Day</div>';
  for (let i = 0; i < 7; i++) {
    const pct = (byDay[i] / maxDay * 100).toFixed(0);
    html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
      <span style="font-size:.68rem;width:28px;color:var(--text-dim);font-weight:600">${dayNames[i]}</span>
      <div style="flex:1;height:6px;background:var(--bg-warm);border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:var(--sky);border-radius:3px"></div>

  document.getElementById('weekdaySpending').innerHTML = html;
}

function renderComparison() {
  const now = new Date();
  const thisMk = getMonthKey(viewMonth);
  const lastMonth = new Date(viewMonth.getFullYear(), viewMonth.getMonth() - 1, 1);
  const lastMk = getMonthKey(lastMonth);

  const thisIncome = getMonthIncome(thisMk);
  const lastIncome = getMonthIncome(lastMk);
  const thisExpense = getMonthExpense(thisMk);
  const lastExpense = getMonthExpense(lastMk);

  function compClass(curr, prev, invert) {
    if (prev === 0) return 'neutral';
    const diff = curr - prev;
    if (invert) return diff > 0 ? 'up' : diff < 0 ? 'down' : 'neutral';
    return diff > 0 ? 'down' : diff < 0 ? 'up' : 'neutral';
  }
  function compLabel(curr, prev) {
    if (prev === 0) return '\u2014';
    const diff = ((curr - prev) / prev * 100).toFixed(0);
    return (diff >= 0 ? '+' : '') + diff + '%';
  }

  document.getElementById('compSection').innerHTML = `
    <div class="comparison">
      <div class="cat-title" style="margin-bottom:6px">vs Last Month</div>
      <div class="comp-row">
        <span class="comp-label">Income</span>
        <span class="comp-value ${compClass(thisIncome, lastIncome, false)}">${compLabel(thisIncome, lastIncome)}</span>
      </div>
      <div class="comp-row">
        <span class="comp-label">Spending</span>
        <span class="comp-value ${compClass(thisExpense, lastExpense, true)}">${compLabel(thisExpense, lastExpense)}</span>
      </div>
      <div class="comp-row">
        <span class="comp-label">Net</span>
        <span class="comp-value ${(thisIncome - thisExpense) >= (lastIncome - lastExpense) ? 'down' : 'up'}">${fmt(thisIncome - thisExpense)} vs ${fmt(lastIncome - lastExpense)}</span>
      </div>
    </div>`;
}

function renderPatternCards() {
  const patterns = Object.entries(data.patterns).filter(([k, p]) => p.count >= 3 && p.category !== 'pay' && p.category !== 'tips');
  if (patterns.length === 0) {
    document.getElementById('patternCards').innerHTML = '';
    return;
  }

  let html = '<div class="cat-title" style="margin-bottom:8px">Spending Patterns</div>';
  // Sort by count descending
  patterns.sort((a, b) => b[1].count - a[1].count);
  for (const [key, p] of patterns.slice(0, 10)) {
    const maxDay = p.dayDistribution.indexOf(Math.max(...p.dayDistribution));
    const dayName = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][maxDay];
    const dayPct = (p.dayDistribution[maxDay] / p.count * 100).toFixed(0);
    let detail = `${p.count} times \u2022 ~${fmt(p.avgAmount)} avg`;
    if (p.avgGapDays > 0 && p.avgGapDays < 35) detail += ` \u2022 every ~${Math.round(p.avgGapDays)}d`;
    if (p.dayDistribution[maxDay] / p.count > 0.35) detail += ` \u2022 ${dayPct}% on ${dayName}`;
    html += `<div class="insight-card"><strong>${titleCase(key)}</strong><br>${detail}</div>`;
  }
  document.getElementById('patternCards').innerHTML = html;
}

function addCustomCategory() {
  const iconKey = document.getElementById('newCatEmoji').value || 'pin';
  const emoji = CUSTOM_ICONS[iconKey] || CUSTOM_ICONS.pin;
  const name = document.getElementById('newCatName').value.trim();
  const color = document.getElementById('newCatColor').value;
  if (!name) { toast('Enter a category name'); return; }
  const key = name.toLowerCase().replace(/[^a-z0-9]/g, '');
  if (!key) { toast('Invalid name'); return; }
  if (CATEGORIES[key]) { toast('Category already exists'); return; }

  if (!data.settings.customCategories) data.settings.customCategories = {};
  data.settings.customCategories[key] = { label: name, color: color, icon: emoji };
  CATEGORIES[key] = { label: name, color: color, icon: emoji };
  saveData();
  document.getElementById('newCatEmoji').value = 'pin';
  document.getElementById('newCatName').value = '';
  renderCatManager();
  toast(name + ' category added');
}

function deleteCategory(key) {
  if (key === 'pay' || key === 'tips' || key === 'other') return;
  const info = CATEGORIES[key];
  if (!confirm('Delete "' + info.label + '" category? Existing transactions will show as Other.')) return;

  // Remove from custom categories
  if (data.settings.customCategories && data.settings.customCategories[key]) {

  }
  delete CATEGORIES[key];
  saveData();
  renderCatManager();
  toast(info.label + ' removed');
}

function stripAmount(raw) {
  if (!raw) return raw;
  // Strip $XX.XX anywhere
  let t = raw.replace(/\$\s*[\d,]+\.?\d*/g, '').trim();
  if (t !== raw) return t;
  // Strip number at end: "Royal Restaurant 22"
  t = raw.replace(/\s+[\d,]+\.?\d*\s*$/, '').trim();
  if (t !== raw) return t;
  // Strip number at start: "22 Royal Restaurant"
  t = raw.replace(/^[\d,]+\.?\d*\s+/, '').trim();
  return t;
}

function saveTransaction() {
  const text = stripAmount(document.getElementById('quickInput').value.trim());
  const amount = parseFloat(document.getElementById('fieldAmount').value);
  const date = document.getElementById('fieldDate').value;
  const notes = document.getElementById('fieldNote').value.trim();
  const isRecurring = document.getElementById('fieldRecurring').checked;

  if (!text) { toast('Enter a description'); return; }
  if (!amount || amount <= 0) { toast('Enter an amount'); return; }
  if (!date) { toast('Pick a date'); return; }

  const d = new Date(date + 'T12:00:00');
  const tx = {
    id: editingTx ? editingTx.id : 'tx_' + Date.now(),
    text: text,
    amount: amount,
    type: modalType,
    category: modalCategory,
    date: date,
    time: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false }),
    dayOfWeek: d.getDay(),
    recurring: isRecurring,
    notes: notes || ''
  };

  if (editingTx) {
    // Update existing
    const idx = data.transactions.findIndex(t => t.id === editingTx.id);
    if (idx >= 0) data.transactions[idx] = tx;
  } else {
    data.transactions.push(tx);
  }

  // Update patterns
  updatePatterns(tx);

  // Add to recurring if checked, or update existing recurring item
  if (isRecurring) {
    const exists = data.recurring.find(r => r.text.toLowerCase() === text.toLowerCase());
    if (exists) {
      exists.amount = amount;
      exists.type = modalType;
      exists.category = modalCategory;
      exists.dayOfMonth = d.getDate();
      exists.active = true;
      tx.recurringId = exists.id;
    } else {
      const recId = 'rec_' + Date.now();
      tx.recurringId = recId;
      data.recurring.push({
        id: recId,
        text: text,
        amount: amount,
        type: modalType,
        category: modalCategory,
        dayOfMonth: d.getDate(),
        active: true
      });
    }
  }

  saveData();
  closeAddModal();
  toast(editingTx ? 'Transaction updated' : `${titleCase(text)} \u2022 ${fmt(amount)} saved`);
  renderAll();
}

}

// ===== CLOUD SYNC =====
var DEFAULT_SYNC_URL = 'https://script.google.com/macros/s/AKfycbwbYSLJOiEV6FwvdnNCfCDOcTyGISAJ-b3w3yRe6w-WPfBOeBeAGgPRSaSBR-YFqasT4w/exec';
function getSyncUrl() {
  var url = (data && data.settings && data.settings.syncUrl) || '';
  if (!url) url = localStorage.getItem('rc_sync_url') || '';
  if (!url) url = DEFAULT_SYNC_URL;
  // Persist so settings field shows the URL
  if (url) {
    if (!localStorage.getItem('rc_sync_url')) localStorage.setItem('rc_sync_url', url);
    if (data && data.settings && !data.settings.syncUrl) { data.settings.syncUrl = url; }
  }
  return url;
}

function fireGet(url) { var img = new Image(); img.src = url; }

function syncToCloud() {
  if (!syncReady) return;
  const ep = getSyncUrl();
  if (!ep) return;
  // Safety: refuse to overwrite cloud with empty data
  if (!data.transactions || data.transactions.length === 0) return;
  clearTimeout(_syncTimer);
  // Save immediately — Google Sheets is the priority
  doSync(false);
}

function doSync(showFeedback) {
  _syncTimer = null;
  const ep = getSyncUrl();
  if (!ep) { if (showFeedback) toast('No sync URL set'); return; }
  if (showFeedback) toast('Syncing...');

  // Step 1: Pull latest from sheet first
  jsonpFetch(ep + '?action=load', function(err, resp) {
    var cloud = null;
    if (!err && resp && resp.ok && resp.data) {
      try { cloud = typeof resp.data === 'string' ? JSON.parse(resp.data) : resp.data; } catch(e) {}
    }

    // Step 2: Merge — add any cloud transactions we don't have locally
    if (cloud && cloud.transactions && cloud.transactions.length > 0) {
      const localIds = new Set(data.transactions.map(t => t.id));
      // Combine deleted IDs from both sides
      const localDeleted = new Set(data.deletedIds || []);
      const cloudDeleted = new Set(cloud.deletedIds || []);
      // Merge deleted lists
      if (!data.deletedIds) data.deletedIds = [];
      for (const did of cloudDeleted) {
        if (!localDeleted.has(did)) data.deletedIds.push(did);
      }
      const allDeleted = new Set(data.deletedIds);
      // Remove locally any transactions the other device deleted
      data.transactions = data.transactions.filter(t => !cloudDeleted.has(t.id));
      let merged = 0;
      for (const ct of cloud.transactions) {
        if (ct.id && !localIds.has(ct.id) && !allDeleted.has(ct.id)) {
          data.transactions.push(ct);
          merged++;
        }
      }
      // Also merge recurring, patterns, scanMemory from cloud
      if (cloud.recurring) {
        const localRecIds = new Set((data.recurring || []).map(r => r.id));
        for (const cr of cloud.recurring) {
          if (cr.id && !localRecIds.has(cr.id)) {
            if (!data.recurring) data.recurring = [];
            data.recurring.push(cr);
          }
        }
      }
      if (cloud.scanMemory) {
        if (!data.scanMemory) data.scanMemory = {};
        for (const [k, v] of Object.entries(cloud.scanMemory)) {
          if (!data.scanMemory[k]) data.scanMemory[k] = v;
        }
      }
      if (merged > 0) {
        // Save merged data to localStorage
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        renderAll();
      }
    }

    // Step 3: Push merged data to sheet
    const payload = JSON.stringify(data);
    const txCount = data.transactions.length;
    fetch(ep, {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type': 'text/plain'},
      body: JSON.stringify({ action: 'save', data: payload })
    }).then(function() {
      // Verify save worked
      setTimeout(function() {
        jsonpFetch(ep + '?action=load', function(err2, resp2) {
          if (err2 || !resp2 || !resp2.ok || !resp2.data) {
            showSyncWarning(true);
            if (showFeedback) toast('Cloud save may have failed');
            return;
          }
          var check;
          try { check = typeof resp2.data === 'string' ? JSON.parse(resp2.data) : resp2.data; } catch(e) {}
          if (check && check.transactions && check.transactions.length >= txCount) {
            showSyncWarning(false);
            if (showFeedback) toast('Synced ' + txCount + ' transactions');
          } else {
            showSyncWarning(true);
            if (showFeedback) toast('Sync may have failed');
          }
        });
      }, 2500);
    }).catch(function(e) {
      showSyncWarning(true);
      if (showFeedback) toast('Sync failed: ' + e.message);
    });
  });
}

function showSyncWarning(show) {
  var el = document.getElementById('syncWarning');
  if (!el) {
    el = document.createElement('div');
    el.id = 'syncWarning';
    el.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#c0392b;color:#fff;padding:8px 12px;font-size:.78rem;text-align:center;z-index:9999;display:none;font-weight:600';
    el.innerHTML = 'Cloud sync failed — your data is saved locally but NOT in the cloud. Try Push to Cloud from Settings.';
    document.body.prepend(el);
  }
  el.style.display = show ? 'block' : 'none';
}

function loadFromCloud(showToast) {
  const ep = getSyncUrl();
  if (!ep) { if (showToast) toast('No sync URL set'); return; }
  if (!showToast && _syncTimer) return;
  if (showToast) toast('Loading from cloud...');
  const loadStartedAt = _lastLocalSave;

  jsonpFetch(ep + '?action=load', function(err, resp) {
    if (err) {
      if (showToast) toast('Cloud fetch failed: ' + err);
      return;
    }
    if (!showToast && _lastLocalSave > loadStartedAt) return;
    if (!resp || !resp.ok) {
      if (showToast) toast('Cloud error: ' + ((resp && resp.error) || 'unknown'));
      return;
    }
    if (!resp.data) {
      if (showToast) toast('Cloud is empty');
      return;
    }
    let cloud;
    try { cloud = typeof resp.data === 'string' ? JSON.parse(resp.data) : resp.data; } catch(e) {
      if (showToast) toast('Cloud data corrupted');
      return;
    }
    if (!cloud || !cloud.transactions) {
      if (showToast) toast('Cloud data invalid');
      return;
    }
    // Always restore from cloud if local is empty
    var localEmpty = !data.transactions || data.transactions.length === 0;
    if (!showToast && !localEmpty) {
      if (data.lastModified && (!cloud.lastModified || data.lastModified >= cloud.lastModified)) return;
      // Safety: never auto-overwrite local data that has MORE transactions than cloud
      if (data.transactions.length > cloud.transactions.length) {
        console.warn('Cloud has fewer transactions (' + cloud.transactions.length + ') than local (' + data.transactions.length + ') — skipping auto-restore');
        return;
      }
    }
    // Preserve local deletedIds so deleted transactions don't come back
    var savedDeletedIds = (data && data.deletedIds) ? data.deletedIds.slice() : [];
    data = cloud;
    // Merge back saved deletedIds
    if (!data.deletedIds) data.deletedIds = [];
    for (var i = 0; i < savedDeletedIds.length; i++) {
      if (data.deletedIds.indexOf(savedDeletedIds[i]) === -1) data.deletedIds.push(savedDeletedIds[i]);
    }
    // Filter out any deleted transactions
    if (data.deletedIds.length > 0) {
      var delSet = new Set(data.deletedIds);
      data.transactions = data.transactions.filter(function(t) { return !delSet.has(t.id); });
    }
    CATEGORIES = Object.assign({}, DEFAULT_CATEGORIES);
    loadCustomCategories();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    renderAll();
    if (showToast) toast('Restored ' + data.transactions.length + ' transactions from cloud');
  });
}

function peekCloud() {
  var ep = getSyncUrl();
  if (!ep) { toast('No sync URL set'); return; }
  toast('Checking cloud...');
  jsonpFetch(ep + '?action=load', function(err, resp) {
    if (err) { toast('Cloud fetch failed: ' + err); return; }
    if (!resp || !resp.ok) { toast('Cloud error: ' + ((resp && resp.error) || 'unknown')); return; }
    if (!resp.data) { toast('Cloud is EMPTY — no data saved'); return; }
    var cloud;
    try { cloud = typeof resp.data === 'string' ? JSON.parse(resp.data) : resp.data; } catch(e) {
      toast('Cloud data corrupted'); return;
    }
    if (!cloud || !cloud.transactions) { toast('Cloud data invalid'); return; }
    toast('Cloud has ' + cloud.transactions.length + ' transactions, ' + (cloud.recurring || []).length + ' recurring. Safe to restore!');
  });
}

function jsonpFetch(url, callback) {
  let done = false;
  const cbName = '_rcCb_' + Date.now();
  const script = document.createElement('script');
  window[cbName] = function(resp) {
    done = true;
    delete window[cbName];
    script.remove();
    callback(null, resp);
  };
  script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName;
  script.onerror = function() {
    if (!done) { delete window[cbName]; script.remove(); callback('Script load failed'); }
  };
  setTimeout(function() {
    if (!done) { delete window[cbName]; script.remove(); callback('Timeout'); }
  }, 15000);
  document.head.appendChild(script);
}

// ===== SCAN MEMORY (fuzzy item recognition) =====
// data.scanMemory = { normalizedOcr: { name, category, variants: [ocr1, ocr2, ...] } }

function normalizeScan(text) {
  return text.toLowerCase().replace(/[^a-z0-9 ]/g, '').replace(/\s+/g, ' ').trim();
}

function getSignificantWords(text) {
  // Split into words, keep only meaningful ones (3+ chars, not pure numbers)
  return normalizeScan(text).split(' ').filter(w => w.length >= 3 && !/^\d+$/.test(w));
}

function matchScanMemory(ocrText) {
  if (!data.scanMemory) return null;
  const norm = normalizeScan(ocrText);
  // 1. Exact normalized match
  if (data.scanMemory[norm]) return data.scanMemory[norm];
  // 2. Check against all stored variants
  const ocrWords = getSignificantWords(ocrText);
  if (ocrWords.length === 0) return null;
  let bestMatch = null, bestScore = 0;
  for (const [key, mem] of Object.entries(data.scanMemory)) {
    const variants = mem.variants || [key];
    for (const v of variants) {
      const vWords = getSignificantWords(v);
      if (vWords.length === 0) continue;
      let shared = 0;
      for (const ow of ocrWords) {
        for (const vw of vWords) {
          // Exact word match or abbreviation (one is prefix of the other, min 3 chars)
          if (ow === vw || (ow.length >= 3 && vw.startsWith(ow)) || (vw.length >= 3 && ow.startsWith(vw))) {
            shared++; break;
          }
        }
      }
      const score = shared / Math.max(ocrWords.length, vWords.length);
      if (score > bestScore) { bestScore = score; bestMatch = mem; }
    }
  }
  // Need at least 50% word overlap to match
  return bestScore >= 0.5 ? bestMatch : null;
}

function learnScanItem(ocrText, preferredName, category) {
  if (!data.scanMemory) data.scanMemory = {};
  const norm = normalizeScan(ocrText);
  if (!norm) return;
  // Check if this preferred name already has an entry
  let existing = null;
  for (const [key, mem] of Object.entries(data.scanMemory)) {
    if (mem.name.toLowerCase() === preferredName.toLowerCase()) {
      existing = { key, mem }; break;
    }
  }
  if (existing) {
    // Add this OCR variant to existing entry
    if (!existing.mem.variants) existing.mem.variants = [existing.key];
    if (!existing.mem.variants.includes(norm)) existing.mem.variants.push(norm);
    existing.mem.category = category;
    // Also store under new normalized key for fast exact lookup
    data.scanMemory[norm] = existing.mem;
  } else {
    data.scanMemory[norm] = { name: preferredName, category, variants: [norm] };
  }
  saveData();
}

function resizeImage(file, maxDim, callback) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      let w = img.width, h = img.height;
      if (w > maxDim || h > maxDim) {
        if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
        else { w = Math.round(w * maxDim / h); h = maxDim; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      // Get base64 without the data:image/jpeg;base64, prefix
      const dataUrl = canvas.toDataURL('image/jpeg', 0.75);
      const base64 = dataUrl.split(',')[1];
      callback(base64);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function sendScanToBackend(base64) {
  const ep = getSyncUrl();
  const scanId = 'scan_' + Date.now();

  // POST image to Apps Script (fire-and-forget due to CORS)
  fetch(ep, {
    method: 'POST',
    mode: 'no-cors',
    headers: {'Content-Type': 'text/plain'},
    body: JSON.stringify({ action: 'scan_receipt', id: scanId, image: base64 })
  }).catch(() => {});

  // Poll for result via JSONP
  document.getElementById('scanStatus').textContent = 'AI is reading your receipt...';
  let attempts = 0;
  const maxAttempts = 30; // 60 seconds max

  function poll() {
    attempts++;
    if (attempts > maxAttempts) {
      document.getElementById('scanOverlay').classList.remove('show');
      toast('Scan timed out. Try again.');
      return;
    }

    jsonpFetch(ep + '?action=scan_result&id=' + scanId, function(err, resp) {
      if (err) {
        // Retry
        setTimeout(poll, 2000);
        return;
      }

      if (resp && resp.pending) {
        // Still processing
        document.getElementById('scanStatus').textContent =
          attempts < 5 ? 'AI is reading your receipt...' :
          attempts < 15 ? 'Still processing...' : 'Almost done...';
        setTimeout(poll, 2000);
        return;
      }

      // Got a result
      document.getElementById('scanOverlay').classList.remove('show');

      if (resp && resp.ok === false) {
        toast('Scan error: ' + (resp.error || 'Unknown'));
        return;
      }

      if (resp && resp.receipt) {
        showReceiptReview(resp.receipt);
      } else {
        toast('Could not parse receipt');
      }
    });
  }

  // Wait a bit before first poll (give Gemini time to process)
  setTimeout(poll, 3000);
}

function showReceiptReview(receipt) {
  const store = receipt.store || 'Unknown Store';
  const date = receipt.date || new Date().toISOString().split('T')[0];
  const items = receipt.items || [];
  const tax = receipt.tax || 0;
  const total = receipt.total || 0;

  // Auto-categorize each item, applying scan memory
  scanItems = items.map((item, i) => {
    const mem = matchScanMemory(item.name);
    return {
      idx: i,
      ocrName: item.name, // original OCR text (never changes)
      name: mem ? mem.name : item.name,
      price: parseFloat(item.price) || 0,
      category: mem ? mem.category : autoCategory(item.name),
      checked: true,
      memorized: !!mem // flag: was this auto-corrected by memory?
    };
  });

  // Store metadata
  scanItems._store = store;
  scanItems._date = date;
  scanItems._tax = tax;
  scanItems._total = total;
  editingIdx = -1;

  // Render
  document.getElementById('reviewStore').textContent =
    store + (date ? ' \u2022 ' + date : '') + (total ? ' \u2022 Total: $' + total.toFixed(2) : '');

  renderReviewItems();
  document.getElementById('reviewModal').classList.add('show');
}

function renderReviewItems() {
  let html = '';
  let checkedTotal = 0;

  for (const item of scanItems) {
    const info = CATEGORIES[item.category] || CATEGORIES.other;
    if (item.checked) checkedTotal += item.price;

    if (editingIdx === item.idx) {
      // Inline edit mode
      let catHtml = '';
      for (const [key, cat] of Object.entries(CATEGORIES)) {
        catHtml += `<div class="review-edit-cat${item.category === key ? ' active' : ''}" onclick="event.stopPropagation();setReviewCat(${item.idx},'${key}')">${cat.icon} ${cat.label}</div>`;
      }
      html += `<div class="review-edit-row" onclick="event.stopPropagation()">
        <div class="review-edit-field">
          <label>Name</label>
          <input id="editName${item.idx}" value="${esc(item.name)}" onclick="event.stopPropagation()">
        </div>
        <div class="review-edit-field">
          <label>Price</label>
          <input id="editPrice${item.idx}" type="number" inputmode="decimal" step="0.01" value="${item.price.toFixed(2)}" onclick="event.stopPropagation()">
        </div>
        <div class="review-edit-field" style="align-items:flex-start">
          <label style="margin-top:4px">Cat</label>
          <div class="review-edit-cats">${catHtml}</div>
        </div>
        <div class="review-edit-btns">
          <button class="review-edit-cancel" onclick="event.stopPropagation();cancelEdit()">Cancel</button>
          <button class="review-edit-save" onclick="event.stopPropagation();saveEdit(${item.idx})">Save</button>
        </div>
      </div>`;
    } else {
      // Normal display row
      html += `<div class="review-item${item.checked ? '' : ' unchecked'}">
        <div class="review-check${item.checked ? ' checked' : ''}" onclick="event.stopPropagation();toggleReviewItem(${item.idx})">${item.checked ? SVG('<polyline points="20 6 9 17 4 12"/>') : ''}</div>
        <div class="review-item-body" onclick="event.stopPropagation();openEdit(${item.idx})">
          <div class="review-item-name">${esc(titleCase(item.name))}</div>
          <div class="review-item-cat">${info.icon} ${info.label}</div>
          ${item.memorized ? '<div class="review-item-memorized">auto-recognized</div>' : ''}
        </div>
        <div class="review-item-price" onclick="event.stopPropagation();openEdit(${item.idx})">$${item.price.toFixed(2)}</div>
        <div class="review-item-edit" onclick="event.stopPropagation();openEdit(${item.idx})">${SVG('<path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>')}</div>
      </div>`;
    }
  }

  // Tax row if present
  if (scanItems._tax > 0) {
    html += `<div class="review-item" style="opacity:0.6">
      <div style="width:20px"></div>
      <div class="review-item-body"><div class="review-item-name">Tax</div></div>
      <div class="review-item-price">$${scanItems._tax.toFixed(2)}</div>
      <div style="width:24px"></div>
    </div>`;
  }

  // Total
  const count = scanItems.filter(i => i.checked).length;
  html = `<div class="review-total">
    <span class="review-total-label">${count} item${count !== 1 ? 's' : ''} selected</span>
    <span class="review-total-value">$${checkedTotal.toFixed(2)}</span>
  </div>` + html;

  document.getElementById('reviewItems').innerHTML = html;
  document.getElementById('btnAddAll').textContent = `Add ${count} Item${count !== 1 ? 's' : ''}`;
}

function openEdit(idx) {
  editingIdx = idx;
  renderReviewItems();
  // Focus the name field
  setTimeout(() => {
    const el = document.getElementById('editName' + idx);
    if (el) { el.focus(); el.select(); }
  }, 50);
}

function cancelEdit() {
  editingIdx = -1;
  renderReviewItems();
}

function setReviewCat(idx, cat) {
  const item = scanItems.find(i => i.idx === idx);
  if (item) item.category = cat;
  renderReviewItems();
  // Keep edit open (don't close)
}

function saveEdit(idx) {
  const item = scanItems.find(i => i.idx === idx);
  if (!item) return;
  const nameEl = document.getElementById('editName' + idx);
  const priceEl = document.getElementById('editPrice' + idx);
  const newName = (nameEl.value || '').trim();
  const newPrice = parseFloat(priceEl.value) || 0;
  if (!newName) { toast('Name cannot be empty'); return; }

  // If user changed the name from the OCR text, learn it
  const ocrNorm = normalizeScan(item.ocrName);
  const newNorm = normalizeScan(newName);
  if (ocrNorm !== newNorm) {
    learnScanItem(item.ocrName, newName, item.category);
  } else if (item.ocrName && item.category) {
    // Even if name didn't change, learn the category preference
    learnScanItem(item.ocrName, newName, item.category);
  }

  item.name = newName;
  item.price = newPrice;
  editingIdx = -1;
  renderReviewItems();
}

function toggleReviewItem(idx) {
  const item = scanItems.find(i => i.idx === idx);
  if (item) {
    item.checked = !item.checked;
    renderReviewItems();
  }
}

function closeReview() {
  document.getElementById('reviewModal').classList.remove('show');
  scanItems = [];
  editingIdx = -1;
}

function addAllReviewItems() {
  const checked = scanItems.filter(i => i.checked);
  if (checked.length === 0) { toast('No items selected'); return; }

  const store = scanItems._store || 'Store';
  const date = scanItems._date || new Date().toISOString().split('T')[0];
  const d = new Date(date + 'T12:00:00');
  const tax = scanItems._tax || 0;
  const subtotal = checked.reduce((s, i) => s + i.price, 0);

  for (const item of checked) {
    // Learn every item that gets added (reinforces memory)
    learnScanItem(item.ocrName, item.name, item.category);

    // Distribute tax proportionally across items
    const taxShare = subtotal > 0 && tax > 0 ? Math.round(item.price / subtotal * tax * 100) / 100 : 0;
    const tx = {
      id: 'tx_' + Date.now() + '_' + item.idx,
      text: item.name,
      amount: +(item.price + taxShare).toFixed(2),
      type: 'expense',
      category: item.category,
      date: date,
      time: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false }),
      dayOfWeek: d.getDay(),
      recurring: false,
      notes: store
    };
    data.transactions.push(tx);
    updatePatterns(tx);
  }

  saveData();
  closeReview();
  toast(`${checked.length} items added from ${store}`);
  renderAll();
}

// Auto-load from cloud on startup — only applies if cloud data is newer (timestamp guard)
// syncReady stays false until this completes, blocking any cloud saves during restore
// applyRecurring() is deferred to here so it only runs ONCE after sync settles
setTimeout(function() {
  const ep = getSyncUrl();
  if (!ep) {
    applyRecurring();
    saveData();
    renderAll();
    syncReady = true;
    return;
  }
  // Inline cloud restore with syncReady gate — replaces loadFromCloud(false) call
  jsonpFetch(ep + '?action=load', function(err, resp) {
    if (!err && resp && resp.ok && resp.data) {
      let cloud;
      try { cloud = typeof resp.data === 'string' ? JSON.parse(resp.data) : resp.data; } catch(e) {}
      if (cloud && cloud.transactions) {
        // Always restore from cloud if local is empty
        var localEmpty = !data.transactions || data.transactions.length === 0;
        // Safety: never auto-overwrite local data that has MORE transactions than cloud
        var localMore = !localEmpty && data.transactions.length > cloud.transactions.length;
        if (localEmpty || (!localMore && (!data.lastModified || (cloud.lastModified && cloud.lastModified > data.lastModified)))) {
          // Preserve local deletedIds so deleted transactions don't resurrect
          var savedDeletedIds = (data && data.deletedIds) ? data.deletedIds.slice() : [];
          data = cloud;
          if (!data.deletedIds) data.deletedIds = [];
          for (var i = 0; i < savedDeletedIds.length; i++) {
            if (data.deletedIds.indexOf(savedDeletedIds[i]) === -1) data.deletedIds.push(savedDeletedIds[i]);
          }
          if (data.deletedIds.length > 0) {
            var delSet = new Set(data.deletedIds);
            data.transactions = data.transactions.filter(function(t) { return !delSet.has(t.id); });
          }
          CATEGORIES = Object.assign({}, DEFAULT_CATEGORIES);
          loadCustomCategories();
          applyRecurring();
          localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
          renderAll();
        }
      }
    }
    syncReady = true;
  });
}, 1500);

// Auto-pull from cloud when app comes back to foreground — use doSync for proper merge
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'visible' && syncReady) {
    doSync(false);
  }
});

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js').catch(() => {});
}
