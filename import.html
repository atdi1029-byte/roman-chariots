<!DOCTYPE html>
<html><head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Import Oct 2025</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #faf5ee; color: #3a3530; padding: 16px; max-width: 600px; margin: 0 auto; }
  h2 { font-family: 'Playfair Display', Georgia, serif; color: #3a3530; margin-bottom: 12px; font-size: 1.4rem; }
  p.hint { font-size: .82rem; color: #8a7e6e; margin-bottom: 16px; }
  table { width: 100%; border-collapse: collapse; font-size: .85rem; }
  th { text-align: left; padding: 8px 6px; background: #e8dfd4; color: #6a5e50; font-size: .75rem; text-transform: uppercase; letter-spacing: .5px; }
  td { padding: 8px 6px; border-bottom: 1px solid #e8dfd4; }
  tr.income-row { background: #f0f7f4; }
  tr.food-row { background: #fdf6ee; }
  .cat-toggle {
    display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: .75rem;
    font-weight: 600; cursor: pointer; user-select: none; transition: all .15s;
  }
  .cat-toggle:active { transform: scale(0.95); }
  .cat-pay { background: #5aa088; color: white; }
  .cat-tips { background: #6ab898; color: white; }
  .cat-groceries { background: #c8884a; color: white; }
  .cat-eatingout { background: #d4874a; color: white; }
  .cat-other { background: #9a8e78; color: white; }
  .amt { text-align: right; font-weight: 600; }
  .amt.income { color: #5aa088; }
  .amt.expense { color: #3a3530; }
  button.import-btn {
    display: block; width: 100%; margin-top: 16px; padding: 14px; font-size: 1rem; font-weight: 700;
    background: #52b4c8; color: white; border: none; border-radius: 12px; cursor: pointer;
  }
  button.import-btn:active { background: #4a9eb0; }
  #result { margin-top: 12px; font-weight: 600; color: #5aa088; }
</style>
</head>
<body>
<h2>Import October 2025</h2>
<p class="hint">Tap category chips to change between Pay/Tips or Groceries/Eating Out before importing.</p>
<table>
  <thead><tr><th>Date</th><th>Item</th><th>Category</th><th style="text-align:right">Amount</th></tr></thead>
  <tbody id="rows"></tbody>
</table>
<button class="import-btn" onclick="doImport()">Import All</button>
<div id="result"></div>

<script>
const oct = [
  {text:'Grocery', amount:15, type:'expense', category:'groceries', date:'2025-10-05'},
  {text:'Salary', amount:256, type:'income', category:'pay', date:'2025-10-05'},
  {text:'Toll', amount:6, type:'expense', category:'transport', date:'2025-10-06'},
  {text:'Grocery', amount:37.50, type:'expense', category:'groceries', date:'2025-10-06'},
  {text:'Salary', amount:350, type:'income', category:'pay', date:'2025-10-07'},
  {text:'Salary', amount:350, type:'income', category:'pay', date:'2025-10-08'},
  {text:'Grocery', amount:20, type:'expense', category:'groceries', date:'2025-10-08'},
  {text:'Macrofactor App', amount:72, type:'expense', category:'subscriptions', date:'2025-10-08'},
  {text:'Salary', amount:300, type:'income', category:'pay', date:'2025-10-08'},
  {text:'Mexican', amount:31, type:'expense', category:'eatingout', date:'2025-10-10'},
  {text:'Fuel', amount:2, type:'expense', category:'transport', date:'2025-10-10'},
  {text:'Insurance', amount:166, type:'expense', category:'bills', date:'2025-10-12', recurring:true},
  {text:'Grocery', amount:32, type:'expense', category:'groceries', date:'2025-10-12'},
  {text:'Salary', amount:330, type:'income', category:'pay', date:'2025-10-12'},
  {text:'Pharmacy Stuff', amount:26, type:'expense', category:'health', date:'2025-10-14'},
  {text:'Salary', amount:214, type:'income', category:'pay', date:'2025-10-14'},
  {text:'Salary', amount:15, type:'income', category:'tips', date:'2025-10-14'},
  {text:'Pharmacy Stuff', amount:27, type:'expense', category:'health', date:'2025-10-15'},
  {text:'Grocery', amount:38, type:'expense', category:'groceries', date:'2025-10-15'},
  {text:'Fuel', amount:32, type:'expense', category:'transport', date:'2025-10-17'},
  {text:'Salary', amount:368, type:'income', category:'pay', date:'2025-10-18'},
  {text:'Pharmacy Stuff', amount:35, type:'expense', category:'health', date:'2025-10-19'},
  {text:'Grocery', amount:28, type:'expense', category:'groceries', date:'2025-10-19'},
  {text:'Salary', amount:53, type:'income', category:'tips', date:'2025-10-19'},
  {text:'Salary', amount:300, type:'income', category:'pay', date:'2025-10-19'},
  {text:'Salary', amount:20, type:'income', category:'tips', date:'2025-10-19'},
  {text:'Fuel', amount:31, type:'expense', category:'transport', date:'2025-10-19'},
  {text:'YMCA Membership', amount:28, type:'expense', category:'subscriptions', date:'2025-10-20', recurring:true},
  {text:'Grocery', amount:10, type:'expense', category:'groceries', date:'2025-10-21'},
  {text:'Grocery', amount:32, type:'expense', category:'groceries', date:'2025-10-23'},
  {text:'Fuel', amount:29, type:'expense', category:'transport', date:'2025-10-23'},
  {text:'Salary', amount:220, type:'income', category:'pay', date:'2025-10-23'},
  {text:'Grocery', amount:23, type:'expense', category:'groceries', date:'2025-10-25'},
  {text:'Salary', amount:311, type:'income', category:'pay', date:'2025-10-25'},
  {text:'Fuel', amount:32, type:'expense', category:'transport', date:'2025-10-26'},
  {text:'Cell Phone', amount:88, type:'expense', category:'bills', date:'2025-10-26', recurring:true},
  {text:'Salary', amount:66, type:'income', category:'pay', date:'2025-10-28'},
  {text:'Grocery', amount:32, type:'expense', category:'groceries', date:'2025-10-28'},
  {text:'Salary', amount:50, type:'income', category:'tips', date:'2025-10-28'},
  {text:'Cat Stuff', amount:42, type:'expense', category:'other', date:'2025-10-29'},
  {text:'Grocery', amount:11, type:'expense', category:'groceries', date:'2025-10-30'},
  {text:'Fuel', amount:29, type:'expense', category:'transport', date:'2025-10-31'},
];

const TOGGLE_MAP = {
  pay: 'tips',
  tips: 'pay',
  groceries: 'eatingout',
  eatingout: 'groceries'
};

const CAT_LABELS = {
  pay: 'Pay', tips: 'Tips', groceries: 'Groceries', eatingout: 'Eating Out',
  transport: 'Transport', bills: 'Bills', subscriptions: 'Subs', health: 'Health',
  entertainment: 'Fun', other: 'Other'
};

function renderRows() {
  const tbody = document.getElementById('rows');
  let html = '';
  oct.forEach(function(t, i) {
    const toggleable = TOGGLE_MAP[t.category] ? true : false;
    const rowClass = t.type === 'income' ? 'income-row' : (t.category === 'groceries' || t.category === 'eatingout') ? 'food-row' : '';
    const catClass = 'cat-' + t.category;
    html += '<tr class="' + rowClass + '">' +
      '<td>' + t.date.substring(5) + '</td>' +
      '<td>' + t.text + '</td>' +
      '<td>' + (toggleable
        ? '<span class="cat-toggle ' + catClass + '" onclick="toggleCat(' + i + ')">' + CAT_LABELS[t.category] + '</span>'
        : '<span class="cat-toggle cat-other">' + CAT_LABELS[t.category] + '</span>') +
      '</td>' +
      '<td class="amt ' + t.type + '">' + (t.type === 'income' ? '+' : '-') + '$' + t.amount.toFixed(2) + '</td>' +
    '</tr>';
  });
  tbody.innerHTML = html;
}

function toggleCat(i) {
  const t = oct[i];
  if (TOGGLE_MAP[t.category]) {
    t.category = TOGGLE_MAP[t.category];
    renderRows();
  }
}

function doImport() {
  const KEY = 'roman_chariots_v1';
  var data;
  try {
    data = JSON.parse(localStorage.getItem(KEY));
    if (!data || !data.transactions) throw 0;
  } catch(e) {
    data = { transactions: [], recurring: [], patterns: {}, settings: { name: '', syncUrl: '' }, lastModified: Date.now() };
  }

  var added = 0;
  oct.forEach(function(t) {
    var d = new Date(t.date + 'T12:00:00');
    data.transactions.push({
      id: 'tx_' + Date.now() + '_' + Math.random().toString(36).substring(2,6),
      text: t.text,
      amount: t.amount,
      type: t.type,
      category: t.category,
      date: t.date,
      time: '12:00',
      dayOfWeek: d.getDay(),
      recurring: t.recurring || false,
      notes: ''
    });
    added++;
  });

  data.lastModified = Date.now();
  localStorage.setItem(KEY, JSON.stringify(data));
  document.getElementById('result').innerHTML = 'Done! Added ' + added + ' transactions. Go back to the app and reload.';
}

renderRows();
</script>
</body>
</html>
