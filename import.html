<!DOCTYPE html>
<html><head><title>Import Oct 2025</title></head>

    data = JSON.parse(localStorage.getItem(KEY));

  ];

  let added = 0;
  oct.forEach(function(t) {
    const d = new Date(t.date + 'T12:00:00');
    data.transactions.push({
      id: 'tx_' + Date.now() + '_' + Math.random().toString(36).substring(2,6),
      text: t.text,
      amount: t.amount,
      type: t.type,
      category: t.category,
      date: t.date,
      time: '12:00',
      dayOfWeek: d.getDay(),
      recurring: t.recurring || false,
      notes: ''
    });
    added++;
  });

  data.lastModified = Date.now();
  localStorage.setItem(KEY, JSON.stringify(data));
  document.getElementById('result').innerHTML = '<h3 style="color:green">Done! Added ' + added + ' transactions. Go back to the app and reload.</h3>';
}
</script>
</body>
</html>
